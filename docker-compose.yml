services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: growth_mvp
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  memcached:
    image: memcached:alpine

  backend_php:
    build: ./backend
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://root:password@mysql:3306/growth_mvp?serverVersion=8.0&charset=utf8mb4
      MEMCACHED_DSN: memcached://memcached:11211
      TELEGRAM_MOCK: "true"
      TELEGRAM_TOKEN_ENCRYPTION_KEY: ${TELEGRAM_TOKEN_ENCRYPTION_KEY:-c2VjcmV0LWtleS0zMi1ieXRlcy1sb25nISEh}
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-growth_mvp_jwt_pass}
      LOAD_FIXTURES: ${LOAD_FIXTURES:-1}
    depends_on:
      mysql:
        condition: service_healthy
      memcached:
        condition: service_started

  backend_nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend_php

  frontend:
    build: ./frontend
    ports:
      - "5001:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      VITE_DISABLE_HMR: ${VITE_DISABLE_HMR:-true}
    depends_on:
      - backend_nginx

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "5002:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: password
    depends_on:
      - mysql

volumes:
  mysql_data:
  backend_vendor:
